<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sharingan — Number Guessing Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080508;
      --surface: #110a0a;
      --surface2: #1a0d0d;
      --border: #3a1515;
      --text: #f5e8e8;
      --muted: #7a5555;
      --accent: #e53e3e;
      --accent-glow: rgba(229,62,62,0.4);
      --accent2: #c53030;
      --success: #4ade80;
      --danger: #ff6b6b;
      --warn: #fbbf24;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Sharingan tomoe pattern background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 50% 50%, rgba(229,62,62,0.04) 0%, transparent 70%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.15;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* ── SHARINGAN EYE SVG ── */
    .eye-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: -0.5rem;
    }

    .sharingan-eye {
      width: 60px;
      height: 60px;
      animation: spinSlow 8s linear infinite;
      filter: drop-shadow(0 0 12px rgba(229,62,62,0.7));
    }

    @keyframes spinSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* ── HEADER ── */
    .banner { text-align: center; }

    .banner h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 13vw, 6rem);
      letter-spacing: 0.12em;
      line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 50px var(--accent-glow), 0 0 20px var(--accent-glow);
    }

    .banner p {
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* ── SCORE BAR ── */
    .score-bar {
      display: flex;
      justify-content: space-between;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.75rem 1.25rem;
      font-size: 0.82rem;
    }

    .score-item { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .score-val  { font-size: 1.3rem; font-weight: 600; color: var(--accent); }
    .score-lbl  { font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .streak-val { color: var(--warn); }
    .best-val   { color: #fc8181; }

    /* ── DIFFICULTY ── */
    .diff-row { display: flex; gap: 0.6rem; }

    .diff-btn {
      flex: 1;
      padding: 0.6rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
    }

    .diff-sub {
      font-size: 0.62rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      opacity: 0.6;
      font-weight: 400;
    }
    .diff-btn:hover { border-color: var(--accent); color: var(--accent); }
    .diff-btn.active        { background: var(--accent);  border-color: var(--accent);  color: #080508; }
    .diff-btn.active.medium { background: var(--warn);    border-color: var(--warn);    color: #080508; }
    .diff-btn.active.hard   { background: #7b0000;        border-color: #ff0000;        color: #ff9999; }

    /* ── GAME CARD ── */
    .game-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      position: relative;
      overflow: hidden;
    }

    /* subtle inner glow */
    .game-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: radial-gradient(ellipse at 50% 0%, rgba(229,62,62,0.06), transparent 60%);
      pointer-events: none;
    }

    .game-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .lives-display { display: flex; gap: 0.3rem; font-size: 1rem; }

    /* ── INPUT ROW ── */
    .input-row { display: flex; gap: 0.6rem; }

    #guessInput {
      flex: 1;
      padding: 0.85rem 1.1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1.1rem;
      font-weight: 500;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #guessInput:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(229,62,62,0.15); }
    #guessInput:disabled { opacity: 0.4; cursor: not-allowed; }

    #guessBtn {
      padding: 0.85rem 1.4rem;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #080508;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #guessBtn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
    #guessBtn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── FEEDBACK ── */
    #feedback {
      text-align: center;
      font-size: 1.05rem;
      font-weight: 500;
      min-height: 1.5rem;
      transition: all 0.3s;
    }
    #feedback.high    { color: var(--danger); }
    #feedback.low     { color: #fc8181; }
    #feedback.correct { color: var(--success); }
    #feedback.hint    { color: var(--warn); }
    #feedback.info    { color: var(--muted); }

    /* ── RANGE BAR ── */
    .range-bar-wrap { display: flex; flex-direction: column; gap: 0.4rem; }
    .range-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .range-track {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      border: 1px solid var(--border);
      position: relative;
      overflow: visible;
    }
    #rangeMarker {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
      transition: left 0.4s ease;
      left: 50%;
    }

    /* ── GUESS CHIPS ── */
    #guessHistory { display: flex; flex-wrap: wrap; gap: 0.4rem; min-height: 1.5rem; }

    .guess-chip {
      padding: 0.25rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.78rem;
      font-weight: 600;
      border: 1px solid;
      animation: popIn 0.2s ease;
    }
    @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .guess-chip.high    { background: rgba(255,107,107,0.12); border-color: rgba(255,107,107,0.4); color: var(--danger); }
    .guess-chip.low     { background: rgba(229,62,62,0.1);    border-color: rgba(229,62,62,0.3);   color: #fc8181; }
    .guess-chip.correct { background: rgba(74,222,128,0.12);  border-color: rgba(74,222,128,0.4);  color: var(--success); }

    /* ── PLAY AGAIN ── */
    #playAgainBtn {
      display: none;
      width: 100%;
      padding: 0.9rem;
      border-radius: 10px;
      border: 1px solid #7b0000;
      background: transparent;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
    }
    #playAgainBtn:hover { background: rgba(229,62,62,0.1); transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }

    /* ── FLASH ── */
    @keyframes flashGreen { 0%,100%{background:var(--surface)} 50%{background:rgba(74,222,128,0.08)} }
    @keyframes flashRed   { 0%,100%{background:var(--surface)} 50%{background:rgba(229,62,62,0.12)} }
    .flash-win  { animation: flashGreen 0.6s ease; }
    .flash-lose { animation: flashRed   0.6s ease; }

    @media (max-width: 400px) {
      .diff-btn { font-size: 0.72rem; padding: 0.5rem; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <!-- SHARINGAN EYE -->
  <div class="eye-wrap">
    <svg class="sharingan-eye" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <!-- outer ring -->
      <circle cx="50" cy="50" r="46" fill="none" stroke="#e53e3e" stroke-width="2.5"/>
      <!-- iris -->
      <circle cx="50" cy="50" r="38" fill="#1a0000"/>
      <!-- tomoe 1 -->
      <circle cx="50" cy="22" r="7" fill="#e53e3e"/>
      <circle cx="50" cy="28" r="4" fill="#1a0000"/>
      <!-- tomoe 2 -->
      <circle cx="73" cy="63" r="7" fill="#e53e3e"/>
      <circle cx="67.5" cy="59" r="4" fill="#1a0000"/>
      <!-- tomoe 3 -->
      <circle cx="27" cy="63" r="7" fill="#e53e3e"/>
      <circle cx="32.5" cy="59" r="4" fill="#1a0000"/>
      <!-- pupil -->
      <circle cx="50" cy="50" r="14" fill="#e53e3e"/>
      <circle cx="50" cy="50" r="8" fill="#0a0000"/>
    </svg>
  </div>

  <!-- BANNER -->
  <div class="banner">
    <h1>SHARINGAN</h1>
    <p>The eye that sees all — can you find the number?</p>
  </div>

  <!-- SCORE BAR -->
  <div class="score-bar">
    <div class="score-item">
      <span class="score-val" id="scoreVal">0</span>
      <span class="score-lbl">Score</span>
    </div>
    <div class="score-item">
      <span class="score-val streak-val" id="streakVal">0</span>
      <span class="score-lbl">Streak 🔥</span>
    </div>
    <div class="score-item">
      <span class="score-val best-val" id="bestVal">0</span>
      <span class="score-lbl">Best</span>
    </div>
  </div>

  <!-- DIFFICULTY -->
  <div class="diff-row">
    <button class="diff-btn easy active" onclick="setDifficulty('easy')">Genin<span class="diff-sub">Easy</span></button>
    <button class="diff-btn medium" onclick="setDifficulty('medium')">Chunin<span class="diff-sub">Medium</span></button>
    <button class="diff-btn hard" onclick="setDifficulty('hard')">Jonin<span class="diff-sub">Hard</span></button>
  </div>

  <!-- GAME CARD -->
  <div class="game-card" id="gameCard">

    <div class="game-info">
      <span id="rangeLabel">Guess 1–10</span>
      <div class="lives-display" id="livesDisplay"></div>
    </div>

    <div class="input-row">
      <input type="number" id="guessInput" placeholder="?" autocomplete="off"/>
      <button id="guessBtn" onclick="submitGuess()">Guess</button>
    </div>

    <div id="feedback" class="info">Activate your Sharingan and find the number!</div>

    <div class="range-bar-wrap">
      <div class="range-labels">
        <span id="rangeLow">1</span>
        <span id="rangeHigh" style="text-align:right"></span>
      </div>
      <div class="range-track">
        <div id="rangeMarker"></div>
      </div>
    </div>

    <div id="guessHistory"></div>

  </div>

  <button id="playAgainBtn" onclick="newGame()">🔴 Activate Sharingan Again</button>

</div>

<script>
  const DIFFICULTIES = {
    easy:   { max: 10,  lives: 5, label: '1–10',  hintAfter: 2 },
    medium: { max: 50,  lives: 6, label: '1–50',  hintAfter: 3 },
    hard:   { max: 100, lives: 7, label: '1–100', hintAfter: 4 },
  };

  let secretNumber, maxNum, livesLeft, maxLives, guesses, hintAfter;
  let currentDiff = 'easy';
  let score = 0, streak = 0, best = 0;
  let gameOver = false;

  newGame();

  function setDifficulty(diff) {
    currentDiff = diff;
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.diff-btn.${diff}`).classList.add('active');
    newGame();
  }

  function newGame() {
    const cfg  = DIFFICULTIES[currentDiff];
    maxNum     = cfg.max;
    maxLives   = cfg.lives;
    livesLeft  = cfg.lives;
    hintAfter  = cfg.hintAfter;
    guesses    = [];
    gameOver   = false;
    secretNumber = Math.floor(Math.random() * maxNum) + 1;

    document.getElementById('rangeLabel').textContent  = `Guess ${cfg.label}`;
    document.getElementById('rangeLow').textContent    = '1';
    document.getElementById('rangeHigh').textContent   = maxNum;
    document.getElementById('guessHistory').innerHTML  = '';
    document.getElementById('feedback').textContent    = 'Activate your Sharingan and find the number!';
    document.getElementById('feedback').className      = 'info';
    document.getElementById('guessInput').disabled     = false;
    document.getElementById('guessInput').value        = '';
    document.getElementById('guessBtn').disabled       = false;
    document.getElementById('playAgainBtn').style.display = 'none';
    document.getElementById('rangeMarker').style.left  = '50%';

    renderLives();
    updateScoreBar();
    document.getElementById('guessInput').focus();
  }

  function submitGuess() {
    if (gameOver) return;
    const input = document.getElementById('guessInput').value.trim();
    const guess = Number(input);
    if (!input || isNaN(guess) || guess < 1 || guess > maxNum) {
      setFeedback(`Enter a number between 1 and ${maxNum}.`, 'info');
      return;
    }
    guesses.push(guess);
    document.getElementById('guessInput').value = '';
    document.getElementById('guessInput').focus();

    const result = checkGuess(guess);
    addGuessChip(guess, result);
    updateRangeMarker(guess);

    if (result === 'correct') {
      handleWin();
    } else {
      livesLeft--;
      renderLives();
      if (livesLeft <= 0) {
        handleLose();
      } else {
        const hint = getHint();
        const dir  = result === 'high' ? '⬇ Too high!' : '⬆ Too low!';
        setFeedback(hint ? `${dir}  👁 ${hint}` : dir, hint ? 'hint' : result);
      }
    }
  }

  document.getElementById('guessInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitGuess();
  });

  function checkGuess(guess) {
    if (guess === secretNumber) return 'correct';
    return guess > secretNumber ? 'high' : 'low';
  }

  function getHint() {
    const wrong = guesses.length - (guesses.includes(secretNumber) ? 1 : 0);
    if (wrong < hintAfter) return null;
    const hints = [
      () => secretNumber % 2 === 0 ? 'The number is even.' : 'The number is odd.',
      () => secretNumber <= Math.floor(maxNum / 2)
        ? `It's in the lower half (1–${Math.floor(maxNum/2)}).`
        : `It's in the upper half (${Math.floor(maxNum/2)+1}–${maxNum}).`,
      () => {
        const diff = Math.abs(guesses[guesses.length - 1] - secretNumber);
        if (diff <= 2) return "The Sharingan senses you're very close! 🔴";
        if (diff <= 5) return "Getting warmer...";
        return "Still searching...";
      },
    ];
    return hints[Math.min(Math.floor((wrong - hintAfter)), hints.length - 1)]();
  }

  function handleWin() {
    const pts = Math.max(10, 100 - (guesses.length - 1) * 10) * livesLeft;
    score += pts; streak++; if (score > best) best = score;
    updateScoreBar();
    setFeedback(`👁 Sharingan unlocked it! The number was ${secretNumber}. +${pts} pts`, 'correct');
    flashCard('flash-win');
    endGame();
  }

  function handleLose() {
    streak = 0; updateScoreBar();
    setFeedback(`💀 Sharingan fades... The number was ${secretNumber}.`, 'high');
    flashCard('flash-lose');
    endGame();
  }

  function endGame() {
    gameOver = true;
    document.getElementById('guessInput').disabled = true;
    document.getElementById('guessBtn').disabled   = true;
    document.getElementById('playAgainBtn').style.display = 'block';
  }

  function renderLives() {
    const el = document.getElementById('livesDisplay');
    el.innerHTML = '';
    for (let i = 0; i < maxLives; i++) {
      const s = document.createElement('span');
      s.textContent = i < livesLeft ? '🔴' : '⚫';
      el.appendChild(s);
    }
  }

  function addGuessChip(guess, result) {
    const chip = document.createElement('span');
    chip.className = `guess-chip ${result}`;
    chip.textContent = guess;
    document.getElementById('guessHistory').appendChild(chip);
  }

  function updateRangeMarker(guess) {
    document.getElementById('rangeMarker').style.left = `${((guess-1)/(maxNum-1))*100}%`;
  }

  function setFeedback(msg, type) {
    const el = document.getElementById('feedback');
    el.textContent = msg; el.className = type;
  }

  function updateScoreBar() {
    document.getElementById('scoreVal').textContent  = score;
    document.getElementById('streakVal').textContent = streak;
    document.getElementById('bestVal').textContent   = best;
  }

  function flashCard(cls) {
    const card = document.getElementById('gameCard');
    card.classList.add(cls);
    setTimeout(() => card.classList.remove(cls), 600);
  }
</script>

</body>
</html>
